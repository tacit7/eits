  <circle cx="90" cy="170" r="2" fill="#F1C40F"/>
  <circle cx="110" cy="170" r="2" fill="#F1C40F"/>
  <circle cx="100" cy="90" r="2" fill="#F1C40F"/>

  <!-- Speech bubble -->
  <path d="M 140,20 C 135,20 130,25 130,30 L 130,50 C 130,55 135,60 140,60 L 180,60 C 185,60 190,55 190,50 L 190,30 C 190,25 185,20 180,20 Z M 145,60 L 135,75 L 155,60 Z" fill="white" stroke="black" stroke-width="2"/>

